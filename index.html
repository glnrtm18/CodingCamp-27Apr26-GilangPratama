<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Balance Display -->
    <header class="balance-display">
      <h1 class="balance-label">Total Spent</h1>
      <p class="balance-total" id="balanceTotal">$0.00</p>
    </header>

    <main class="app-grid">
      <!-- Input Form -->
      <section class="form-section" aria-labelledby="formHeading">
        <h2 id="formHeading">Add Expense</h2>
        <form id="expenseForm" novalidate>
          <div class="form-field">
            <label for="itemName">Item Name</label>
            <input
              type="text"
              id="itemName"
              name="itemName"
              placeholder="e.g. Lunch"
              autocomplete="off"
            />
            <span
              class="field-error"
              id="itemNameError"
              role="alert"
              aria-live="polite"
            ></span>
          </div>

          <div class="form-field">
            <label for="amount">Amount</label>
            <input
              type="number"
              id="amount"
              name="amount"
              placeholder="0.00"
              min="0.01"
              step="0.01"
            />
            <span
              class="field-error"
              id="amountError"
              role="alert"
              aria-live="polite"
            ></span>
          </div>

          <div class="form-field">
            <label for="category">Category</label>
            <select id="category" name="category">
              <option value="">-- Select category --</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
            <span
              class="field-error"
              id="categoryError"
              role="alert"
              aria-live="polite"
            ></span>
          </div>

          <button type="submit" class="btn-submit">Add Expense</button>
        </form>
      </section>

      <!-- Transaction List -->
      <section class="list-section" aria-labelledby="listHeading">
        <h2 id="listHeading">Transactions</h2>
        <ul id="transactionList" class="transaction-list" aria-label="Transaction list">
          <li class="empty-state" id="listEmptyState">No expenses recorded yet.</li>
        </ul>
      </section>

      <!-- Chart Container -->
      <section class="chart-section" aria-labelledby="chartHeading">
        <h2 id="chartHeading">Spending by Category</h2>
        <div class="chart-container">
          <canvas id="expenseChart" aria-label="Spending distribution pie chart" role="img"></canvas>
          <p class="chart-empty-state" id="chartEmptyState">Add an expense to see the chart.</p>
        </div>
      </section>
    </main>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <!-- App logic -->
    <script src="js/app.js" defer></script>
  </body>
</html>
